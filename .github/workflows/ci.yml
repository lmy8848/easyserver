name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true # caches both GOMODCACHE and GOCACHE

      - name: Download dependencies
        run: go mod download

      # embed.go (non-dev) requires internal/api/web/dist to exist.
      # See Makefile `build-web`. CI uses a placeholder; real prod release
      # copies web/dist there via `make build`.
      - name: Stub web/dist for embed
        run: mkdir -p internal/api/web/dist && echo '<html></html>' > internal/api/web/dist/index.html

      - name: Format check (gofmt)
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::Files not gofmt'd:"
            echo "$out"
            exit 1
          fi

      - name: Build (production, CGO disabled)
        run: CGO_ENABLED=0 go build -o easyserver ./cmd/server

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
