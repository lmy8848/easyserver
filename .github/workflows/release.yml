name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史用于 git describe

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd web
          pnpm install
          pnpm lint
          pnpm build
          mkdir -p ../internal/api/web/dist
          cp -a dist/. ../internal/api/web/dist/

      - name: Build linux-amd64
        run: |
          VERSION=${{ github.ref_name }}
          LDFLAGS="-X easyserver/internal/api.Version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o easyserver-linux-amd64 ./cmd/server

      - name: Build linux-arm64
        run: |
          VERSION=${{ github.ref_name }}
          LDFLAGS="-X easyserver/internal/api.Version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o easyserver-linux-arm64 ./cmd/server

      - name: Smoke test (amd64)
        run: |
          cat > /tmp/easyserver-test.yaml << 'EOF'
          server:
            port: 18080
            host: "127.0.0.1"
            serve_frontend: false
          auth:
            jwt_secret: "ci-smoke-test-jwt-secret-at-least-32-bytes-long!!"
          deploy:
            encryption_key: "ci-smoke-test-encryption-key-32-bytes!!"
          filemanager:
            base_path: "/tmp/easyserver-data"
          data_dir: /tmp/easyserver-data
          EOF
          chmod +x easyserver-linux-amd64
          MISE_DATA_DIR=/tmp/mise-data ./easyserver-linux-amd64 -config /tmp/easyserver-test.yaml &
          PID=$!
          # 轮询等待监听，最多 15s
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:18080/health >/dev/null 2>&1 && { echo "Smoke test PASSED"; break; }
            if ! kill -0 "$PID" 2>/dev/null; then
              wait "$PID"; RC=$?
              echo "Smoke test FAILED — binary exited early with code $RC"; exit 1
            fi
            sleep 1
            [ "$i" = 15 ] && { echo "Smoke test FAILED — did not listen within 15s"; exit 1; }
          done
          kill "$PID" 2>/dev/null || true

      - name: Calculate checksums
        run: sha256sum easyserver-linux-amd64 easyserver-linux-arm64 > checksums-sha256.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            ./easyserver-linux-amd64 \
            ./easyserver-linux-arm64 \
            ./checksums-sha256.txt \
            --title "${{ github.ref_name }}" \
            --generate-notes
